name: Auto Deploy Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY_ILF }}
          port: 65002
          script: |
            TARGET=/home/u221026474/domains/superfinelabels.in/public_html/cp
            cd $TARGET

            BACKUP_DIR="/tmp/cp-deploy-backup-$$"
            mkdir -p "$BACKUP_DIR"
            [ -f application/config/database.php ] && cp application/config/database.php "$BACKUP_DIR/database.php"
            [ -f .env ] && cp .env "$BACKUP_DIR/.env"
            [ -f deploy.local.php ] && cp deploy.local.php "$BACKUP_DIR/deploy.local.php"

            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://github.com/VELRK/cp.git
            fi

            git fetch origin main
            git reset --hard origin/main

            [ -f "$BACKUP_DIR/database.php" ] && cp "$BACKUP_DIR/database.php" application/config/database.php
            if [ ! -f application/config/database.php ] && [ -f application/config/database.php.example ]; then
              cp application/config/database.php.example application/config/database.php
            fi
            [ -f "$BACKUP_DIR/.env" ] && cp "$BACKUP_DIR/.env" .env
            [ -f "$BACKUP_DIR/deploy.local.php" ] && cp "$BACKUP_DIR/deploy.local.php" deploy.local.php

            rm -rf "$BACKUP_DIR"

            # Redirect /panel/* at site root → /cp/panel/* (old bookmarks without /cp)
            PARENT="$(dirname "$TARGET")"
            ROOT_HT="$PARENT/.htaccess"
            if [ -f "$TARGET/deploy/htaccess.root-redirect" ] && { [ ! -f "$ROOT_HT" ] || ! grep -q 'cp-panel-redirect' "$ROOT_HT" 2>/dev/null; }; then
              {
                echo ""
                echo "# cp-panel-redirect"
                cat "$TARGET/deploy/htaccess.root-redirect"
              } >> "$ROOT_HT"
            fi

            echo "Deployed: $(git rev-parse --short HEAD) at $TARGET"
